# Automatically build, upload to CTAN, and create a GitHub Release when a
# date-based tag (YYYY-MM-DD) is pushed.
name: Release CTAN

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches cls
        run: |
          cls_date=$(sed -n 's|.*\\ProvidesClass{onlinebrief24}\[\([0-9/]*\).*|\1|p' onlinebrief24.cls | tr '/' '-')
          if [ "$cls_date" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${{ steps.version.outputs.version }} does not match cls version $cls_date"
            exit 1
          fi

      - name: Install TeX tools and ctan-o-mat
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            libwww-perl \
            texlive-fonts-extra \
            texlive-lang-german \
            texlive-latex-extra \
            zip
          git clone --depth 1 https://github.com/ge-ne/ctan-o-mat.git /tmp/ctan-o-mat
          sudo install /tmp/ctan-o-mat/ctan-o-mat.pl /usr/local/bin/ctan-o-mat

      - name: Build CTAN package
        run: sh scripts/build-ctan.sh

      - name: Record archive checksum
        run: |
          archive=$(ls dist/ctan/onlinebrief24-*.zip)
          sha256sum "$archive" > "$archive.sha256"

      - name: Extract announcement from tag
        id: announcement
        run: |
          # Use the tag annotation message as the CTAN announcement.
          # Fall back to a default if the tag has no message body.
          body=$(git tag -l --format='%(contents:body)' "${{ steps.version.outputs.version }}")
          if [ -z "$body" ]; then
            body="onlinebrief24 ${{ steps.version.outputs.version }} — see https://github.com/frluciano/latex-onlinebrief24/releases/tag/${{ steps.version.outputs.version }}"
          fi
          # Write to file to preserve newlines.
          echo "$body" > /tmp/announcement.txt

      - name: Prepare ctan-o-mat config
        run: |
          version="${{ steps.version.outputs.version }}"
          archive=$(ls dist/ctan/onlinebrief24-*.zip)
          sed \
            -e "s|\${VERSION}|${version}|g" \
            -e "s|\${CTAN_EMAIL}|${{ secrets.CTAN_EMAIL }}|g" \
            -e "s|\${CTAN_ZIP}|${archive}|g" \
            ctan/onlinebrief24.pkg > /tmp/onlinebrief24.pkg
          perl -0pi -e '
            open my $fh, "<", "/tmp/announcement.txt" or die $!;
            local $/;
            my $announcement = <$fh>;
            chomp $announcement;
            s/\$\{ANNOUNCEMENT\}/$announcement/s;
          ' /tmp/onlinebrief24.pkg

      - name: Validate CTAN package
        run: perl /usr/local/bin/ctan-o-mat --validate /tmp/onlinebrief24.pkg

      - name: Upload to CTAN
        run: perl /usr/local/bin/ctan-o-mat --submit /tmp/onlinebrief24.pkg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          archive=$(ls dist/ctan/onlinebrief24-*.zip)
          checksum="${archive}.sha256"
          announcement=$(cat /tmp/announcement.txt)
          gh release create "$version" \
            "$archive" "$checksum" \
            --title "$version" \
            --notes "$announcement"
