# Publish a previously prepared CTAN artifact only after explicit manual
# approval. This workflow never rebuilds the package and never runs
# automatically on tags or pushes.
name: Release CTAN

on:
  workflow_dispatch:
    inputs:
      prepare_run_id:
        description: "GitHub Actions run ID of a successful 'Prepare CTAN Release' workflow"
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  # Release attempts for the same prepared artifact must serialize so one human
  # approval cannot accidentally green-light two publishes at once.
  group: ${{ github.workflow }}-${{ inputs.prepare_run_id }}
  cancel-in-progress: false

env:
  # The manual release consumes the prepare workflow bundle as-is and then
  # republishes the validated copy inside the same workflow after approval.
  PREPARE_ARTIFACT_NAME: onlinebrief24-ctan-release-bundle
  VALIDATED_ARTIFACT_NAME: validated-onlinebrief24-ctan-release-bundle
  RENDERED_PKG_ARTIFACT_NAME: rendered-onlinebrief24-release-pkg

jobs:
  validate-release-inputs:
    runs-on: ubuntu-latest
    outputs:
      # The publish job checks out and labels itself against the exact commit
      # and version already frozen into the prepared bundle.
      artifact_filename: ${{ steps.metadata.outputs.artifact_filename }}
      bundle_dir: ${{ steps.download_prepare_bundle.outputs.bundle_dir }}
      prepare_run_id: ${{ steps.metadata.outputs.prepare_run_id }}
      source_commit_sha: ${{ steps.metadata.outputs.source_commit_sha }}
      version: ${{ steps.metadata.outputs.version }}

    steps:
      - name: Download prepared release bundle
        id: download_prepare_bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # `gh run download` is not consistent about the exact extraction path.
          # Resolve the real bundle directory from the downloaded metadata file
          # instead of assuming a fixed folder shape.
          download_root="${RUNNER_TEMP}/prepared-download"
          rm -rf "$download_root"
          mkdir -p "$download_root"
          gh run download "${{ inputs.prepare_run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${PREPARE_ARTIFACT_NAME}" \
            --dir "$download_root"
          metadata_path=$(find "$download_root" -type f -name release-metadata.json -print | head -n 1)
          if [ -z "$metadata_path" ]; then
            printf '%s\n' "::error::Could not locate release-metadata.json in the prepared release artifact."
            exit 1
          fi
          bundle_dir=$(dirname "$metadata_path")
          printf '%s\n' "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"

      - name: Validate prepare run provenance
        env:
          GH_TOKEN: ${{ github.token }}
          PREPARE_RUN_ID_INPUT: ${{ inputs.prepare_run_id }}
        run: |
          set -eu
          # Only a successful prepare run from a push to main is eligible for
          # CTAN publishing. This blocks PR artifacts and ad-hoc untrusted runs.
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          run_id = os.environ["PREPARE_RUN_ID_INPUT"]
          repo = os.environ["GITHUB_REPOSITORY"]
          raw = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/actions/runs/{run_id}"],
              text=True,
          )
          data = json.loads(raw)
          errors = []

          if data.get("name") != "Prepare CTAN Release":
              errors.append(f"prepare run {run_id} is not from 'Prepare CTAN Release'")
          if data.get("event") != "push":
              errors.append(f"prepare run {run_id} must come from a push event")
          if data.get("head_branch") != "main":
              errors.append(f"prepare run {run_id} must come from main, got {data.get('head_branch')!r}")
          if data.get("status") != "completed" or data.get("conclusion") != "success":
              errors.append(f"prepare run {run_id} must be completed successfully")

          if errors:
              for message in errors:
                  print(f"::error::{message}")
              sys.exit(1)
          PY

      - name: Read prepared metadata
        id: metadata
        run: |
          set -eu
          # Read only the fields needed to wire the rest of the workflow. Full
          # structural validation happens in the dedicated validation script.
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          bundle_dir = Path("${{ steps.download_prepare_bundle.outputs.bundle_dir }}")
          metadata_path = bundle_dir / "release-metadata.json"
          if not metadata_path.exists():
              raise SystemExit(f"::error file={metadata_path}::Missing prepared release metadata.")

          data = json.loads(metadata_path.read_text(encoding="utf-8"))
          required = ("artifact_filename", "prepare_run_id", "source_commit_sha", "version")
          missing = [key for key in required if not data.get(key)]
          if missing:
              raise SystemExit(f"::error file={metadata_path}::Missing required metadata fields: {', '.join(missing)}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key in required:
                  fh.write(f"{key}={data[key]}\n")
          PY

      - uses: actions/checkout@v6
        with:
          # Validate and later publish against the exact prepared commit rather
          # than the commit currently checked out in the default branch.
          fetch-depth: 0
          ref: ${{ steps.metadata.outputs.source_commit_sha }}

      - name: Validate prepared release bundle
        run: |
          set -eu
          sh scripts/validate-release-inputs.sh \
            "${{ steps.download_prepare_bundle.outputs.bundle_dir }}" \
            "${{ inputs.prepare_run_id }}"

      - name: Verify prepare run SHA matches bundle metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # The artifact payload and the GitHub run record must agree on the
          # commit SHA. A mismatch would mean the bundle is not trustworthy.
          run_sha=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${{ inputs.prepare_run_id }}" --jq '.head_sha')
          if [ "$run_sha" != "${{ steps.metadata.outputs.source_commit_sha }}" ]; then
            printf '%s\n' "::error::Prepare run head SHA $run_sha does not match bundle metadata SHA ${{ steps.metadata.outputs.source_commit_sha }}"
            exit 1
          fi

      - name: Record resolved release metadata
        run: |
          set -eu
          # Preserve the mapping from prepared bundle to release attempt so a
          # later audit can see who requested publication and in which run.
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          bundle_dir = Path("${{ steps.download_prepare_bundle.outputs.bundle_dir }}")
          metadata_path = bundle_dir / "release-metadata.json"
          resolved_path = bundle_dir / "resolved-release-metadata.json"

          data = json.loads(metadata_path.read_text(encoding="utf-8"))
          data["release_run_id"] = os.environ["GITHUB_RUN_ID"]
          data["release_run_attempt"] = os.environ["GITHUB_RUN_ATTEMPT"]
          data["release_requested_by"] = os.environ["GITHUB_ACTOR"]
          data["release_timestamp_utc"] = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          resolved_path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Log release traceability
        run: |
          set -eu
          printf '%s\n' "Prepared run: ${{ inputs.prepare_run_id }}"
          printf '%s\n' "Prepared artifact: ${{ steps.metadata.outputs.artifact_filename }}"
          printf '%s\n' "Prepared commit: ${{ steps.metadata.outputs.source_commit_sha }}"
          printf '%s\n' "Prepared version: ${{ steps.metadata.outputs.version }}"

      - name: Write release validation summary
        run: |
          set -eu
          python3 - <<'PY'
          import json
          import os
          import re
          import zipfile
          from pathlib import Path

          bundle_dir = Path("${{ steps.download_prepare_bundle.outputs.bundle_dir }}")
          metadata = json.loads((bundle_dir / "release-metadata.json").read_text(encoding="utf-8"))
          resolved = json.loads((bundle_dir / "resolved-release-metadata.json").read_text(encoding="utf-8"))
          artifact_path = bundle_dir / metadata["artifact_filename"]
          artifact_version_match = re.fullmatch(
              r"onlinebrief24-([0-9]{4}-[0-9]{2}-[0-9]{2})\.zip",
              metadata["artifact_filename"],
          )
          if not artifact_version_match:
              raise SystemExit(
                  f"::error file={artifact_path}::Could not derive version from artifact filename."
              )

          with zipfile.ZipFile(artifact_path) as archive:
              cls_text = archive.read("onlinebrief24/onlinebrief24.cls").decode("utf-8")
              doc_text = archive.read("onlinebrief24/onlinebrief24-doc.tex").decode("utf-8")

          cls_match = re.search(
              r"\\ProvidesClass\{onlinebrief24\}\[([0-9]{4}/[0-9]{2}/[0-9]{2})\b",
              cls_text,
          )
          if not cls_match:
              raise SystemExit(
                  f"::error file={artifact_path}::Could not extract version from onlinebrief24.cls in artifact."
              )

          doc_match = re.search(r"\\date\{([0-9]{4}-[0-9]{2}-[0-9]{2})\}", doc_text)
          if not doc_match:
              raise SystemExit(
                  f"::error file={artifact_path}::Could not extract date from onlinebrief24-doc.tex in artifact."
              )

          artifact_filename_version = artifact_version_match.group(1)
          cls_version = cls_match.group(1).replace("/", "-")
          doc_version = doc_match.group(1)
          # Show the complete announcement in the validation summary so the
          # approval decision is based on the exact text frozen into the bundle.
          announcement_text = (
              (bundle_dir / metadata["announcement_filename"])
              .read_text(encoding="utf-8")
              .strip()
          ) or "(empty)"

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## Release CTAN validation\n\n")
              fh.write("| Field | Value |\n")
              fh.write("| --- | --- |\n")
              fh.write(f"| Requested prepare run | `{metadata['prepare_run_id']}` |\n")
              fh.write(f"| Release run | `{resolved['release_run_id']}` |\n")
              fh.write(f"| Release actor | `{resolved['release_requested_by']}` |\n")
              fh.write(f"| Source commit | `{metadata['source_commit_sha']}` |\n")
              fh.write(f"| Artifact | `{metadata['artifact_filename']}` |\n")
              fh.write(f"| SHA256 | `{metadata['artifact_sha256']}` |\n")
              fh.write(f"| Approval gate | `ctan-release` environment pending after validation |\n\n")
              fh.write("Version cross-check:\n\n")
              fh.write("| `release-metadata.json` | ZIP filename | `onlinebrief24.cls` in ZIP | `onlinebrief24-doc.tex` in ZIP |\n")
              fh.write("| --- | --- | --- | --- |\n")
              fh.write(
                  f"| `{metadata['version']}` | `{artifact_filename_version}` | `{cls_version}` | `{doc_version}` |\n\n"
              )
              fh.write("Announcement:\n\n")
              fh.write("```text\n")
              fh.write(announcement_text.replace("```", "'''"))
              fh.write("\n```\n\n")
              fh.write("Next step: approve the `ctan-release` deployment before `publish-to-ctan` can access CTAN credentials.\n")
          PY

      - name: Upload validated release bundle
        uses: actions/upload-artifact@v6
        with:
          # The publish job reuses the already validated bundle from this same
          # workflow run after the protected environment gate is approved. Keep
          # it long enough that a failed GitHub-release sync can be retried
          # without ever re-submitting to CTAN.
          name: ${{ env.VALIDATED_ARTIFACT_NAME }}
          path: ${{ steps.download_prepare_bundle.outputs.bundle_dir }}
          if-no-files-found: error
          retention-days: 30

  publish-to-ctan:
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    # The protected environment is the visible human approval gate and the only
    # place where CTAN release credentials are exposed.
    environment: ctan-release

    steps:
      - uses: actions/checkout@v6
        with:
          # Publish from the exact prepared commit so the release context matches
          # the bundle provenance that was just validated.
          fetch-depth: 0
          ref: ${{ needs.validate-release-inputs.outputs.source_commit_sha }}

      - name: Install ctan-o-mat
        run: |
          set -eu
          # Install submission tooling only in the publish job. The prepare
          # workflow must remain physically incapable of performing a submit.
          sudo apt-get update
          sudo apt-get install -y libwww-perl
          git clone --depth 1 https://github.com/ge-ne/ctan-o-mat.git /tmp/ctan-o-mat
          sudo install /tmp/ctan-o-mat/ctan-o-mat.pl /usr/local/bin/ctan-o-mat

      - name: Download validated release bundle
        id: download_validated_bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # Reuse the post-validation bundle produced by this workflow rather
          # than re-downloading the original artifact and reintroducing drift.
          # Resolve the actual extraction directory dynamically for the same
          # reason as in the validate job.
          download_root="${RUNNER_TEMP}/validated-download"
          rm -rf "$download_root"
          mkdir -p "$download_root"
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${VALIDATED_ARTIFACT_NAME}" \
            --dir "$download_root"
          metadata_path=$(find "$download_root" -type f -name release-metadata.json -print | head -n 1)
          if [ -z "$metadata_path" ]; then
            printf '%s\n' "::error::Could not locate release-metadata.json in the validated release artifact."
            exit 1
          fi
          bundle_dir=$(dirname "$metadata_path")
          printf '%s\n' "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"

      - name: Publish prepared artifact to CTAN
        env:
          # This secret is intentionally scoped to the protected environment so
          # no earlier step can access publish credentials.
          CTAN_EMAIL: ${{ secrets.CTAN_EMAIL }}
        run: |
          set -eu
          sh scripts/release-ctan.sh \
            "${{ steps.download_validated_bundle.outputs.bundle_dir }}" \
            "${{ needs.validate-release-inputs.outputs.prepare_run_id }}"

      - name: Upload rendered CTAN submission input
        if: always()
        uses: actions/upload-artifact@v6
        with:
          # Keep a redacted audit copy of the rendered ctan-o-mat input without
          # exposing the CTAN contact email in workflow artifacts.
          name: ${{ env.RENDERED_PKG_ARTIFACT_NAME }}
          path: ${{ steps.download_validated_bundle.outputs.bundle_dir }}/onlinebrief24-release-audit.pkg
          if-no-files-found: ignore
          retention-days: 30

      - name: Write CTAN publish summary
        run: |
          set -eu
          python3 - <<'PY'
          import json
          import os
          import re
          import zipfile
          from pathlib import Path

          bundle_dir = Path("${{ steps.download_validated_bundle.outputs.bundle_dir }}")
          metadata = json.loads((bundle_dir / "release-metadata.json").read_text(encoding="utf-8"))
          resolved = json.loads((bundle_dir / "resolved-release-metadata.json").read_text(encoding="utf-8"))
          artifact_path = bundle_dir / metadata["artifact_filename"]
          rendered_pkg_path = bundle_dir / "onlinebrief24-release-audit.pkg"
          artifact_version_match = re.fullmatch(
              r"onlinebrief24-([0-9]{4}-[0-9]{2}-[0-9]{2})\.zip",
              metadata["artifact_filename"],
          )
          if not artifact_version_match:
              raise SystemExit(
                  f"::error file={artifact_path}::Could not derive version from artifact filename."
              )

          with zipfile.ZipFile(artifact_path) as archive:
              cls_text = archive.read("onlinebrief24/onlinebrief24.cls").decode("utf-8")
              doc_text = archive.read("onlinebrief24/onlinebrief24-doc.tex").decode("utf-8")

          pkg_text = rendered_pkg_path.read_text(encoding="utf-8")

          cls_match = re.search(
              r"\\ProvidesClass\{onlinebrief24\}\[([0-9]{4}/[0-9]{2}/[0-9]{2})\b",
              cls_text,
          )
          doc_match = re.search(r"\\date\{([0-9]{4}-[0-9]{2}-[0-9]{2})\}", doc_text)
          pkg_version_match = re.search(r"\\version\{([0-9]{4}-[0-9]{2}-[0-9]{2})\}", pkg_text)
          pkg_file_match = re.search(r"\\file\{([^}]*)\}", pkg_text)

          if not cls_match or not doc_match or not pkg_version_match or not pkg_file_match:
              raise SystemExit(
                  f"::error file={rendered_pkg_path}::Could not extract one or more release-version fields for the publish summary."
              )

          artifact_filename_version = artifact_version_match.group(1)
          cls_version = cls_match.group(1).replace("/", "-")
          doc_version = doc_match.group(1)
          pkg_version = pkg_version_match.group(1)
          pkg_artifact_name = Path(pkg_file_match.group(1)).name

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## CTAN publish completed\n\n")
              fh.write("| Field | Value |\n")
              fh.write("| --- | --- |\n")
              fh.write(f"| Prepare run | `{metadata['prepare_run_id']}` |\n")
              fh.write(f"| Release run | `{resolved['release_run_id']}` |\n")
              fh.write(f"| Source commit | `{metadata['source_commit_sha']}` |\n")
              fh.write(f"| Artifact | `{metadata['artifact_filename']}` |\n")
              fh.write(f"| SHA256 | `{metadata['artifact_sha256']}` |\n")
              fh.write(f"| Rendered `.pkg` artifact | `{os.environ['RENDERED_PKG_ARTIFACT_NAME']}` |\n")
              fh.write(f"| Rendered `.pkg` audit copy | `{rendered_pkg_path.name}` |\n")
              fh.write(f"| Rendered `.pkg` file target | `{pkg_artifact_name}` |\n\n")
              fh.write("Version cross-check:\n\n")
              fh.write("| `release-metadata.json` | ZIP filename | `onlinebrief24.cls` in ZIP | `onlinebrief24-doc.tex` in ZIP | rendered `.pkg` |\n")
              fh.write("| --- | --- | --- | --- | --- |\n")
              fh.write(
                  f"| `{metadata['version']}` | `{artifact_filename_version}` | `{cls_version}` | `{doc_version}` | `{pkg_version}` |\n\n"
              )
              fh.write("The follow-up workflow `Sync GitHub Release` should now create or update the matching Git tag and GitHub Release from the same validated bundle.\n")
          PY
