# Run the same verification suite for every push and pull request so layout
# regressions are caught before they are merged or released.
name: Build LaTeX Verification

on:
  push:
    # Only run on direct updates to `main`. Feature branches are validated via
    # `pull_request`, which avoids duplicate runs for the same commit.
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # When a branch is updated repeatedly, only the newest verification run is
  # still relevant.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  latex:
    runs-on: ubuntu-latest
    strategy:
      # Keep both engine results visible even if one fails. This is useful
      # while maintaining first-class XeLaTeX and LuaLaTeX support in parallel.
      fail-fast: false
      matrix:
        # Verify both officially supported fontspec engines.
        engine:
          - xelatex
          - lualatex
          - pdflatex

    steps:
      # The workflow is fully repository-local; no external assets are needed.
      - uses: actions/checkout@v6

      - name: Detect verification-relevant changes
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -eu
          changed=$(sh scripts/ci-detect-changes.sh verify)
          printf '%s\n' "verify=$changed" >> "$GITHUB_OUTPUT"

      - name: Skip heavy verification setup when inputs are unchanged
        if: steps.changes.outputs.verify != 'true'
        run: echo "No verification-relevant changes detected; skipping TeX install."

      - name: Install TeX and PDF tools
        if: steps.changes.outputs.verify == 'true'
        run: |
          # Install a minimal but sufficient TeX/PDF toolchain for the examples,
          # the font-dependent modern style, and the page-2 regression checks.
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            poppler-utils \
            texlive-fonts-extra \
            texlive-lang-german \
            texlive-latex-extra \
            texlive-luatex \
            texlive-pictures \
            texlive-xetex

      - name: Build & verify examples (${{ matrix.engine }})
        if: steps.changes.outputs.verify == 'true'
        # The verification script selects the engine via OB24_TEX_ENGINE and
        # handles the LuaLaTeX cache workaround automatically when needed.
        run: OB24_TEX_ENGINE=${{ matrix.engine }} sh scripts/verify.sh
