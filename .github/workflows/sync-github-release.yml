# Keep GitHub Releases aligned with successful CTAN publications without ever
# re-submitting to CTAN. This workflow consumes the validated bundle from a
# completed `Release CTAN` run and is safe to retry independently.
name: Sync GitHub Release

on:
  workflow_run:
    workflows:
      - Release CTAN
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_run_id:
        description: "GitHub Actions run ID of a successful 'Release CTAN' workflow"
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  # Serialize release-sync attempts for the same CTAN release run so automatic
  # and manual retries cannot race each other.
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id || inputs.release_run_id }}
  cancel-in-progress: false

env:
  VALIDATED_ARTIFACT_NAME: validated-onlinebrief24-ctan-release-bundle

jobs:
  sync-github-release:
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Resolve source release run
        id: source_run
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_run_id="${{ inputs.release_run_id }}"
          else
            release_run_id="${{ github.event.workflow_run.id }}"
          fi
          printf '%s\n' "release_run_id=$release_run_id" >> "$GITHUB_OUTPUT"

      - name: Validate release run provenance
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_RUN_ID_INPUT: ${{ steps.source_run.outputs.release_run_id }}
        run: |
          set -eu
          # Only a completed successful `Release CTAN` run from `main` may feed
          # the GitHub release sync. This preserves the same trust boundary as
          # the CTAN publish workflow itself.
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          run_id = os.environ["RELEASE_RUN_ID_INPUT"]
          repo = os.environ["GITHUB_REPOSITORY"]
          raw = subprocess.check_output(
              ["gh", "api", f"repos/{repo}/actions/runs/{run_id}"],
              text=True,
          )
          data = json.loads(raw)
          errors = []

          if data.get("name") != "Release CTAN":
              errors.append(f"release run {run_id} is not from 'Release CTAN'")
          if data.get("event") != "workflow_dispatch":
              errors.append(f"release run {run_id} must come from a workflow_dispatch event")
          if data.get("head_branch") != "main":
              errors.append(f"release run {run_id} must come from main, got {data.get('head_branch')!r}")
          if data.get("status") != "completed" or data.get("conclusion") != "success":
              errors.append(f"release run {run_id} must be completed successfully")

          if errors:
              for message in errors:
                  print(f"::error::{message}")
              sys.exit(1)
          PY

      - name: Download validated release bundle
        id: download_validated_bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # Sync only from the post-validation bundle produced by `Release CTAN`
          # so GitHub never has to infer assets or metadata on its own.
          download_root="${RUNNER_TEMP}/release-sync-download"
          rm -rf "$download_root"
          mkdir -p "$download_root"
          gh run download "${{ steps.source_run.outputs.release_run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${VALIDATED_ARTIFACT_NAME}" \
            --dir "$download_root"
          resolved_metadata_path=$(find "$download_root" -type f -name resolved-release-metadata.json -print | head -n 1)
          if [ -z "$resolved_metadata_path" ]; then
            printf '%s\n' "::error::Could not locate resolved-release-metadata.json in the validated release artifact."
            exit 1
          fi
          bundle_dir=$(dirname "$resolved_metadata_path")
          printf '%s\n' "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"

      - name: Read resolved release metadata
        id: metadata
        run: |
          set -eu
          # Read only the fields needed for checkout and final release tagging.
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          bundle_dir = Path("${{ steps.download_validated_bundle.outputs.bundle_dir }}")
          resolved_path = bundle_dir / "resolved-release-metadata.json"
          if not resolved_path.exists():
              raise SystemExit(f"::error file={resolved_path}::Missing resolved release metadata.")

          data = json.loads(resolved_path.read_text(encoding="utf-8"))
          required = ("artifact_filename", "release_run_id", "source_commit_sha", "version")
          missing = [key for key in required if not data.get(key)]
          if missing:
              raise SystemExit(f"::error file={resolved_path}::Missing required resolved metadata fields: {', '.join(missing)}")

          expected_run_id = "${{ steps.source_run.outputs.release_run_id }}"
          if str(data["release_run_id"]) != expected_run_id:
              raise SystemExit(
                  f"::error file={resolved_path}::Resolved metadata release_run_id {data['release_run_id']} "
                  f"does not match triggering release run ID {expected_run_id}."
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key in required:
                  fh.write(f"{key}={data[key]}\n")
          PY

      - uses: actions/checkout@v6
        with:
          # Sync the Git tag and GitHub Release against the exact commit that
          # CTAN just published from, not against the workflow file's branch tip.
          fetch-depth: 0
          ref: ${{ steps.metadata.outputs.source_commit_sha }}

      - name: Sync Git tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          sh scripts/sync-github-release.sh \
            "${{ steps.download_validated_bundle.outputs.bundle_dir }}" \
            "${{ steps.source_run.outputs.release_run_id }}"

      - name: Write GitHub release sync summary
        env:
          TRIGGER_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eu
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          bundle_dir = Path("${{ steps.download_validated_bundle.outputs.bundle_dir }}")
          metadata = json.loads((bundle_dir / "release-metadata.json").read_text(encoding="utf-8"))
          resolved = json.loads((bundle_dir / "resolved-release-metadata.json").read_text(encoding="utf-8"))
          version = metadata["version"]
          release_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/releases/tag/{version}"

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## GitHub release sync completed\n\n")
              fh.write("| Field | Value |\n")
              fh.write("| --- | --- |\n")
              fh.write(f"| Trigger | `{os.environ['TRIGGER_EVENT_NAME']}` |\n")
              fh.write(f"| Prepare run | `{metadata['prepare_run_id']}` |\n")
              fh.write(f"| Release run | `{resolved['release_run_id']}` |\n")
              fh.write(f"| Source commit | `{metadata['source_commit_sha']}` |\n")
              fh.write(f"| Version / tag | `{version}` |\n")
              fh.write(f"| Artifact | `{metadata['artifact_filename']}` |\n")
              fh.write(f"| SHA256 | `{metadata['artifact_sha256']}` |\n")
              fh.write(f"| Release URL | {release_url} |\n")
          PY
