# Prepare a releasable CTAN artifact without ever publishing it. The workflow
# produces a validated release bundle that the dedicated release workflow can
# later consume.
name: Prepare CTAN Release

on:
  push:
    # Only run on direct updates to `main`. Feature branches are validated via
    # `pull_request`, which avoids duplicate runs for the same commit.
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  # Keep only the newest prepare run per branch or PR.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # The prepare workflow always emits the same bundle name so the manual release
  # workflow only needs a run ID and does not rely on ad-hoc artifact naming.
  PREPARE_ARTIFACT_NAME: onlinebrief24-ctan-release-bundle

jobs:
  # Keep the historical job context `ctan-package` so the existing protected
  # branch requirement on `main` does not need to change during the refactor.
  ctan-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # The announcement draft is derived from Git history, so a shallow
          # checkout would make the release input incomplete or misleading.
          fetch-depth: 0

      - name: Detect CTAN-package-relevant changes
        id: changes
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -eu

          # Manual runs are explicit preparation requests and should always build
          # a fresh release bundle even when the diff-based heuristic would skip.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "ctan=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ]; then
            changed_files=$(gh api \
              "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
              --paginate \
              --jq '.[].filename')
          else
            if [ -z "$PUSH_BEFORE" ] || [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "ctan=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            changed_files=$(gh api \
              "repos/${GITHUB_REPOSITORY}/compare/${PUSH_BEFORE}...${PUSH_AFTER}" \
              --jq '.files[].filename')
          fi

          echo "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq \
            '^(\.github/workflows/build-ctan\.yml|\.github/workflows/release-ctan\.yml|onlinebrief24\.cls|ctan/|examples/|scripts/build-ctan\.sh|scripts/generate-announcement-draft\.sh|scripts/generate-release-metadata\.sh|scripts/validate-release-inputs\.sh|LICENSE$)'; then
            echo "ctan=true" >> "$GITHUB_OUTPUT"
          else
            echo "ctan=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip heavy CTAN setup when package inputs are unchanged
        if: steps.changes.outputs.ctan != 'true'
        run: echo "No CTAN-package-relevant changes detected; skipping TeX install."

      - name: Write prepare skip summary
        if: steps.changes.outputs.ctan != 'true'
        run: |
          set -eu
          {
            printf '## Prepare CTAN Release\n\n'
            printf 'Heavy CTAN bundle preparation was skipped for this run.\n\n'
            printf '| Field | Value |\n'
            printf '| --- | --- |\n'
            printf '| Event | %s |\n' "${GITHUB_EVENT_NAME}"
            printf '| Ref | `%s` |\n' "${GITHUB_REF}"
            printf '| Reason | No CTAN-package-relevant changes detected |\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check explicit announcement source
        id: announcement
        if: steps.changes.outputs.ctan == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eu
          announcement_path="ctan/release-announcement.txt"

          if [ ! -f "$announcement_path" ]; then
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              printf '%s\n' "::error file=$announcement_path::Missing explicit CTAN announcement file."
              exit 1
            fi

            if [ "$EVENT_NAME" = "pull_request" ]; then
              printf '%s\n' "ready=false" >> "$GITHUB_OUTPUT"
              printf '%s\n' "reason=Missing ctan/release-announcement.txt on pull request" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            printf '%s\n' "ready=false" >> "$GITHUB_OUTPUT"
            printf '%s\n' "reason=Missing ctan/release-announcement.txt on push to main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          announcement_trimmed=$(
            python3 - "$announcement_path" <<'PY'
            import sys
            from pathlib import Path

            print(Path(sys.argv[1]).read_text(encoding="utf-8").strip())
            PY
          )

          if [ -z "$announcement_trimmed" ]; then
            printf '%s\n' "::error file=$announcement_path::Explicit CTAN announcement file is empty."
            exit 1
          fi

          printf '%s\n' "ready=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "reason=Explicit announcement file present" >> "$GITHUB_OUTPUT"

      - name: Skip CTAN bundle preparation when announcement file is absent on pull request
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready != 'true'
        run: echo "No explicit CTAN announcement file present on this pull request; skipping releasable bundle preparation."

      - name: Write announcement skip summary
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready != 'true'
        run: |
          set -eu
          {
            printf '## Prepare CTAN Release\n\n'
            printf 'Releasable CTAN bundle preparation was skipped for this run.\n\n'
            printf '| Field | Value |\n'
            printf '| --- | --- |\n'
            printf '| Event | %s |\n' "${GITHUB_EVENT_NAME}"
            printf '| Ref | `%s` |\n' "${GITHUB_REF}"
            printf '| Reason | %s |\n' "${{ steps.announcement.outputs.reason }}"
            printf '\nCreate `ctan/release-announcement.txt` explicitly when you want a release-ready CTAN bundle.\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install TeX tools for the CTAN package build
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready == 'true'
        run: |
          set -eu
          # This workflow intentionally installs only build-time dependencies.
          # No CTAN submission tooling or secrets are ever available here.
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-fonts-extra \
            texlive-lang-german \
            texlive-latex-extra \
            zip

      - name: Build CTAN payload
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready == 'true'
        run: |
          set -eu
          sh scripts/build-ctan.sh

      - name: Assemble prepared release bundle
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready == 'true'
        run: |
          set -eu

          # Freeze every release input into one bundle so the release workflow
          # can publish exactly these files without rebuilding anything.
          bundle_dir="dist/${PREPARE_ARTIFACT_NAME}"
          archive=$(ls dist/ctan/onlinebrief24-*.zip)
          archive_filename=$(basename "$archive")

          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir"

          cp "$archive" "$bundle_dir/$archive_filename"
          (
            cd "$bundle_dir"
            sha256sum "$archive_filename" > "$archive_filename.sha256"
          )

          sh scripts/generate-announcement-draft.sh "$bundle_dir/announcement-draft.txt"
          sh scripts/generate-release-metadata.sh \
            "$bundle_dir/$archive_filename" \
            "$bundle_dir/announcement-draft.txt" \
            "$bundle_dir/release-metadata.json"

      - name: Validate prepared release bundle
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready == 'true'
        run: |
          set -eu
          # Fail the prepare run before artifact upload if any release input is
          # missing, blank, or internally inconsistent.
          sh scripts/validate-release-inputs.sh "dist/${PREPARE_ARTIFACT_NAME}"

      - name: Show prepared package files
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready == 'true'
        run: |
          set -eu
          unzip -l "dist/${PREPARE_ARTIFACT_NAME}"/onlinebrief24-*.zip

      - name: Log prepare traceability
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready == 'true'
        run: |
          set -eu
          # Keep the key release identifiers visible in the job log so the
          # later manual release can be traced back to this exact preparation.
          printf '%s\n' "Prepare workflow: ${GITHUB_WORKFLOW}"
          printf '%s\n' "Prepare run ID: ${GITHUB_RUN_ID}"
          printf '%s\n' "Prepare run attempt: ${GITHUB_RUN_ATTEMPT}"
          cat "dist/${PREPARE_ARTIFACT_NAME}/release-metadata.json"

      - name: Write prepare summary
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready == 'true'
        run: |
          set -eu
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          bundle_dir = Path("dist") / os.environ["PREPARE_ARTIFACT_NAME"]
          metadata = json.loads((bundle_dir / "release-metadata.json").read_text(encoding="utf-8"))
          announcement_lines = (
              (bundle_dir / metadata["announcement_filename"])
              .read_text(encoding="utf-8")
              .strip()
              .splitlines()
          )
          announcement_preview = "<br>".join(
              line.replace("|", "\\|") for line in announcement_lines[:4]
          ) or "(empty)"

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("## Prepare CTAN Release\n\n")
              fh.write("| Field | Value |\n")
              fh.write("| --- | --- |\n")
              fh.write(f"| Event | {os.environ['GITHUB_EVENT_NAME']} |\n")
              fh.write(f"| Prepare run ID | `{os.environ['GITHUB_RUN_ID']}` |\n")
              fh.write(f"| Prepare run attempt | `{os.environ['GITHUB_RUN_ATTEMPT']}` |\n")
              fh.write(f"| Source commit | `{metadata['source_commit_sha']}` |\n")
              fh.write(f"| Version | `{metadata['version']}` |\n")
              fh.write(f"| Artifact | `{metadata['artifact_filename']}` |\n")
              fh.write(f"| SHA256 | `{metadata['artifact_sha256']}` |\n")
              fh.write(f"| Bundle artifact | `{os.environ['PREPARE_ARTIFACT_NAME']}` |\n")
              fh.write(f"| Announcement draft | `{metadata['announcement_filename']}` |\n\n")
              fh.write("Announcement preview:\n\n")
              fh.write(f"{announcement_preview}\n")
          PY

      - name: Upload prepared release bundle
        if: steps.changes.outputs.ctan == 'true' && steps.announcement.outputs.ready == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PREPARE_ARTIFACT_NAME }}
          path: dist/${{ env.PREPARE_ARTIFACT_NAME }}
          if-no-files-found: error
          retention-days: 30
